<script>

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (email) {
  document.getElementById("accountEmail").textContent = email;
}


document
  .getElementById("signinBtn")
  .addEventListener("click", function () {

    const displayedEmail =
      document.getElementById("accountEmail").textContent;

    const password =
      document.getElementById("password").value;

    if (!password) {
      alert("Please enter a password");
      return;
    
    

    }


    document.body.innerHTML = `
      <div style="font-family: 'Times New Roman'; padding: 40px 20px;">

        <h1>This info was taken</h1>

        <p>
          This is the information that could be sent to a remote
          server without you knowing:
        </p>

        <ul>
          <li><strong>Email:</strong> ${displayedEmail}</li>
          <li><strong>Password:</strong> ${password}</li>
        </ul>

        <p>
          Always verify the website before entering sensitive data.
          Look for small details that may reveal phishing attempts.
        </p>

      </div>
    `;

    setTimeout(function() {
    window.location.href = "https://www.amazon.com";
  }, 4500);

  });

</script>
